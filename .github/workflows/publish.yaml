name: Publish to npm

"on": # yamllint disable-line rule:truthy
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for npm provenance / Trusted Publisher OIDC
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync package version to tag
        working-directory: packages/starlight-theme-celestia
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ ! "$REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "Refusing to publish: tag '$REF_NAME' is not a valid semver (vX.Y.Z[-prerelease])" >&2
            exit 1
          fi
          VERSION="${REF_NAME#v}"
          npm pkg set version="$VERSION"

      - name: Build
        run: bun --filter starlight-theme-celestia build

      - name: Publish
        working-directory: packages/starlight-theme-celestia
        run: npm publish --provenance --access public
