when:
  - event: push
    branch: ${CI_REPO_DEFAULT_BRANCH}
  - event: manual

steps:
  - name: Install and build theme
    image: cr.codefloe.com/docker.io/oven/bun:1.3
    environment:
      # Cap native-side parallelism so the build fits on the 3.5 GB CI runner.
      # Sharp/libvips and the @astrojs/compiler WASM runtime live outside JSC's
      # heap; without these caps each spawns one worker per CPU.
      UV_THREADPOOL_SIZE: "2"
      VIPS_CONCURRENCY: "1"
      SHARP_CONCURRENCY: "1"
    commands:
      - bun install
      - bun --smol --filter starlight-theme-celestia build

  - name: Build website
    # Run the Astro build under Node so we can hard-cap V8's heap with
    # --max-old-space-size. `bun --smol` only hints at JSC's target heap and
    # was still OOM'ing during Vite's static-entrypoint init on the 3.5 GB
    # runner. Reuses node_modules installed by bun in the previous step.
    image: cr.codefloe.com/docker.io/library/node:22-slim
    environment:
      UV_THREADPOOL_SIZE: "2"
      VIPS_CONCURRENCY: "1"
      SHARP_CONCURRENCY: "1"
      NODE_OPTIONS: "--max-old-space-size=3072"
    commands:
      - cd website && npx astro build

  - name: Deploy preparation
    image: cr.codefloe.com/docker.io/library/alpine:3.23
    commands:
      - mv website/dist/ /tmp/public
      - mv .git /tmp/.git
      - rm -rf ./* .[!.]* ..?*
      - mv /tmp/public/* ./ && mv /tmp/.git ./

  - name: "Push changes to branch"
    image: cr.codefloe.com/docker.io/appleboy/drone-git-push:1.2.3
    settings:
      remote: ${CI_REPO_CLONE_SSH_URL}
      branch: pages
      commit: true
      force: true
      ssh_key:
        from_secret: devxy_bot_ssh_key
      commit_message: "[skip ci] Deploy demo site ${CI_COMMIT_SHA}"
      author_name: devxy-bot
      author_email: bot@devxy.io
