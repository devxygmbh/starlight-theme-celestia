when:
  - event: push
    branch: ${CI_REPO_DEFAULT_BRANCH}
  - event: manual

steps:
  - name: Build
    image: cr.codefloe.com/docker.io/oven/bun:1.3
    environment:
      # Cap native-side parallelism so the build fits on the 3.5 GB CI runner.
      # Sharp/libvips and the @astrojs/compiler WASM runtime live outside JSC's
      # heap; without these caps each spawns one worker per CPU.
      # JSC heap pressure is handled by `bun --smol` on the website build below.
      UV_THREADPOOL_SIZE: "2"
      VIPS_CONCURRENCY: "1"
      SHARP_CONCURRENCY: "1"
    commands:
      - bun install
      - bun --filter starlight-theme-celestia build
      # Create npx wrapper for Pagefind compatibility
      - |
        cat > /usr/local/bin/npx << 'EOF'
        #!/bin/sh
        # Strip -y flag and forward to bun x
        args=""
        for arg in "$@"; do
          if [ "$arg" != "-y" ]; then
            args="$args $arg"
          fi
        done
        exec bun x $args
        EOF
      - chmod +x /usr/local/bin/npx
      - bun --smol --filter starlight-theme-celestia-website build

  - name: Deploy preparation
    image: cr.codefloe.com/docker.io/library/alpine:3.23
    commands:
      - mv website/dist/ /tmp/public
      - mv .git /tmp/.git
      - rm -rf ./* .[!.]* ..?*
      - mv /tmp/public/* ./ && mv /tmp/.git ./

  - name: "Push changes to branch"
    image: cr.codefloe.com/docker.io/appleboy/drone-git-push:1.2.3
    settings:
      remote: ${CI_REPO_CLONE_SSH_URL}
      branch: pages
      commit: true
      force: true
      ssh_key:
        from_secret: devxy_bot_ssh_key
      commit_message: "[skip ci] Deploy demo site ${CI_COMMIT_SHA}"
      author_name: devxy-bot
      author_email: bot@devxy.io
