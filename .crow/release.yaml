when:
  - event: tag

clone:
  git:
    image: codefloe.com/crow-plugins/clone:1.0.3
    settings:
      tags: true

steps:
  changelog:
    image: cr.codefloe.com/docker.io/thegeeklab/git-sv:2.1.0
    commands:
      - apk add --no-cache -q sed
      - git sv current-version
      - git sv release-notes -t ${CI_COMMIT_TAG} -o CHANGELOG.md
      - sed -i '1,2d' CHANGELOG.md
      - cat CHANGELOG.md

  "Bump version":
    image: cr.codefloe.com/docker.io/library/alpine:3.23
    commands:
      - apk add -q --no-cache sed
      - VERSION="${CI_COMMIT_TAG#v}"
      - sed -i "s/\"version\":\ \"[^\"]*\"/\"version\":\ \"$VERSION\"/" packages/starlight-theme-celestia/package.json
      - echo "Updated package.json to version $VERSION"

  # publish:
  # depends_on:
  # - "Bump version"
  # image: cr.codefloe.com/docker.io/oven/bun:1.3-alpine
  # environment:
  # FORGEJO_TOKEN:
  # from_secret: codefloe_packages_token_devxy_bot
  # commands:
  # - bun install --frozen-lockfile
  # - bun --filter starlight-theme-celestia build
  # - apk add -q --no-cache npm
  # - echo "//codefloe.com/api/packages/devxy/npm/:_authToken=$FORGEJO_TOKEN" > ~/.npmrc
  # - echo "registry=https://codefloe.com/api/packages/devxy/npm/" >> ~/.npmrc
  # - cd packages/starlight-theme-celestia && npm publish

  "Create release":
    depends_on:
      - changelog
    image: cr.codefloe.com/docker.io/woodpeckerci/plugin-release:0.3.1
    settings:
      note: CHANGELOG.md
      api_key:
        from_secret: codefloe_issue_rw_token_devxy_bot
      title: ${CI_COMMIT_TAG}

  "Push changes to repo":
    depends_on:
      - "Bump version"
    image: cr.codefloe.com/docker.io/appleboy/drone-git-push:1.2.3
    settings:
      remote: ${CI_REPO_CLONE_SSH_URL}
      branch: main
      commit: true
      rebase: true
      ssh_key:
        from_secret: devxy_bot_ssh_key
      commit_message: "[skip ci] Bump version to ${CI_COMMIT_TAG}"
      author_name: devxy-bot
      author_email: no-reply@devxy.io
