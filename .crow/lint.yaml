when:
  - event: pull_request
  - event: push
    branch: ${CI_REPO_DEFAULT_BRANCH}

variables:
  - &bun_image "cr.codefloe.com/docker.io/oven/bun:1.3-alpine"

steps:
  install-dependencies:
    image: *bun_image
    commands:
      - bun install --frozen-lockfile

  prettier:
    depends_on:
      - install-dependencies
    # Run prettier directly under Node so we can cap the V8 heap. The
    # woodpecker prettier plugin was aborting with std::bad_alloc on this
    # runner.
    image: cr.codefloe.com/docker.io/library/node:24-alpine
    environment:
      NODE_OPTIONS: "--max-old-space-size=2048"
    commands:
      - npx prettier --check .

  test:
    depends_on:
      - install-dependencies
    # Sub-second plugin-shape regression guard for the package's factory.
    # Runs alongside prettier/build-theme since it has no build outputs.
    image: *bun_image
    commands:
      - bun --filter starlight-theme-celestia test

  build-theme:
    depends_on:
      - install-dependencies
    image: *bun_image
    environment:
      # Cap native-side parallelism so the build fits on the 3.5 GB CI runner.
      # Sharp/libvips and the @astrojs/compiler WASM runtime live outside JSC's
      # heap; without these caps each spawns one worker per CPU.
      UV_THREADPOOL_SIZE: "2"
      VIPS_CONCURRENCY: "1"
      SHARP_CONCURRENCY: "1"
    commands:
      - bun --filter starlight-theme-celestia build

  build-website:
    depends_on:
      - build-theme
    # Run the Astro build under Node — Bun has been crashing on this runner
    # with both OOMs (`--smol` only hints at JSC's target heap) and SIGILL
    # during Vite's static-entrypoint init. Node honors --max-old-space-size
    # as a hard cap. Alpine variant matches the musl sharp binaries that
    # bun installed in the previous step.
    image: cr.codefloe.com/docker.io/library/node:24-alpine
    environment:
      UV_THREADPOOL_SIZE: "2"
      VIPS_CONCURRENCY: "1"
      SHARP_CONCURRENCY: "1"
      NODE_OPTIONS: "--max-old-space-size=3072"
    commands:
      - cd website && npx astro build

  commitlint:
    when:
      - event: pull_request
      - event: pull_request_edited
    image: cr.codefloe.com/docker.io/commitlint/commitlint:20.5.3
    commands:
      - echo $${CI_COMMIT_PULL_REQUEST_TITLE} | commitlint
