# Configuration file for `prek`, a git hook manager written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

[[repos]]
repo = "builtin"
hooks = [
  { id = "end-of-file-fixer" },
  { id = "trailing-whitespace", args = ["--markdown-linebreak-ext=md"] }
]

[[repos]]
repo = "https://github.com/igorshubovych/markdownlint-cli"
rev = "v0.48.0"
hooks = [
  { id = "markdownlint", exclude = "^website/src/content/" }
]

[[repos]]
repo = "https://github.com/rbubley/mirrors-prettier"
rev = "v3.8.1"
hooks = [
  { id = "prettier" }
]

[[repos]]
repo = "https://github.com/adrienverge/yamllint.git"
rev = "v1.38.0"
hooks = [
  { id = "yamllint", args = ["--strict", "-c=.yamllint.yaml"] }
]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "yaml-file-extension"
name = "Check if YAML files has *.yaml extension."
entry = "YAML filenames must have .yaml extension."
language = "fail"
files = ".yml$"

[[repos]]
repo = "https://github.com/editorconfig-checker/editorconfig-checker"
rev = "v3.6.1"
hooks = [
  { id = "editorconfig-checker" }
]
